<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent}
.card{width:1080px;height:1350px;position:relative;overflow:hidden;
  display:flex;flex-direction:column;padding:92px 84px 84px;
  font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:#F6EFE2;
  background:transparent}
.bg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.04);
  filter:brightness(0.6) contrast(1.05) sepia(0.45) saturate(1.45) hue-rotate(-10deg);z-index:0}
.scrim{position:absolute;inset:0;z-index:0;
  background:linear-gradient(180deg,rgba(34,24,14,0.28) 0%,rgba(34,24,14,0.55) 44%,rgba(28,20,12,0.94) 100%)}
.topbar{position:absolute;top:0;left:0;right:0;height:8px;background:#E8693B;z-index:3}
.glow{position:absolute;top:-150px;right:-150px;width:520px;height:520px;border-radius:50%;
  background:radial-gradient(circle,rgba(244,144,90,0.22),rgba(244,144,90,0));pointer-events:none;z-index:1}
.header{display:flex;justify-content:space-between;align-items:flex-start;z-index:2}
.label{font-size:26px;letter-spacing:5px;color:#D6C7B0;font-weight:600}
.count{font-size:26px;color:#D6C7B0;font-weight:600;letter-spacing:2px}
.spacer{flex:1}
.date{color:#F6A06A;font-size:40px;font-weight:700;letter-spacing:3px;margin-bottom:30px;z-index:2}
.headline{font-size:96px;font-weight:800;line-height:1.16;letter-spacing:-2px;z-index:2;
  text-shadow:0 2px 30px rgba(20,12,4,0.6)}
.body{font-size:40px;line-height:1.6;color:#EBE1CF;margin-top:46px;font-weight:500;z-index:2;
  text-shadow:0 2px 18px rgba(20,12,4,0.65)}
.o{color:#F6A06A}
.w{color:#FFFFFF;font-weight:700}

/* hide all by default */
.bg,.scrim,.topbar,.glow,.header,.date,.headline,.body{visibility:hidden}
/* bg layer: gradient + photo + scrim + bar + glow + header (no body text) */
body[data-part="bg"] .card{background:linear-gradient(158deg,#8c7359 0%,#614d3b 52%,#3d2f23 100%)}
body[data-part="bg"] .bg,body[data-part="bg"] .scrim,body[data-part="bg"] .topbar,
body[data-part="bg"] .glow,body[data-part="bg"] .header{visibility:visible}
/* text layers (transparent bg) */
body[data-part="kicker"] .date{visibility:visible}
body[data-part="head1"] .headline{visibility:visible}
body[data-part="head1"] .headline .o{visibility:hidden}
body[data-part="head2"] .headline{visibility:visible}
body[data-part="head2"] .headline .l1{visibility:hidden}
body[data-part="body"] .body{visibility:visible}
</style></head><body>
<section class="card cover">
  <div class="bg" style="background-image:url('photo/p1.jpg')"></div><div class="scrim"></div>
  <div class="topbar"></div><div class="glow"></div>
  <div class="header"><div class="label">1인 AI 에이전시 만들기</div><div class="count">01 / 12</div></div>
  <div class="spacer"></div>
  <div class="date">· EP.4 · SEO</div>
  <div class="headline"><span class="l1">월 5만 클릭 SEO 비법,</span><br><span class="o">배우고도 안 썼다</span></div>
  <div class="body">유튜브에서 본 'SEO 치트키',<br>두 번, 세 번 정독했어요.<br>하지만 내 클라이언트엔 <span class="w">한 줄도 안 썼어요.</span></div>
</section>
<script>
document.body.dataset.part = new URLSearchParams(location.search).get('part') || 'bg';
</script>
</body></html>
