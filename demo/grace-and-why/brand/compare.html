<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grace &amp; Why — 프로필 시안 비교</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&amp;display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Jost',system-ui,sans-serif;background:#15140f;color:#FBF9F5;padding:32px 18px 60px;font-weight:300;-webkit-font-smoothing:antialiased}
  .head{text-align:center;max-width:560px;margin:0 auto 36px}
  .head h1{font-weight:500;font-size:26px;letter-spacing:.01em;margin-bottom:8px}
  .head p{font-size:14px;color:#9a9183;line-height:1.6}
  .pick{display:inline-block;margin-top:12px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#C9A567;border:1px solid rgba(201,165,103,.4);border-radius:999px;padding:6px 16px}
  .grid{max-width:620px;margin:0 auto;display:grid;gap:20px}
  .card{background:#1f1d18;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;display:flex;align-items:center;gap:22px}
  .card.sel{border-color:#C9A567;box-shadow:0 0 0 1px #C9A567 inset}
  .big{width:148px;height:148px;border-radius:50%;flex:none;object-fit:cover;background:#000}
  .meta{flex:1;min-width:0}
  .tag{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#C9A567;font-weight:500}
  .meta h2{font-weight:500;font-size:20px;margin:6px 0 4px}
  .meta p{font-size:13px;color:#9a9183;line-height:1.5}
  .ig{display:flex;align-items:center;gap:10px;margin-top:14px}
  .ig img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid #2a2820}
  .ig .lbl{font-size:11px;color:#6f685b;letter-spacing:.04em}
  .winner{font-size:11px;color:#C9A567;font-weight:500;margin-top:10px;letter-spacing:.04em}
  @media(max-width:480px){.card{gap:16px;padding:18px}.big{width:112px;height:112px}}
</style>
</head>
<body>
  <div class="head">
    <h1>프로필 사진 시안 비교</h1>
    <p>각 시안을 크게 + 인스타 아바타 크기(작게)로 같이 보여줘요. 작게 떴을 때 잘 보이는 게 핵심.</p>
    <span class="pick">현재 선택: V2</span>
  </div>
  <div class="grid">
    <div class="card">
      <img class="big" src="./mark-v1.png" alt="V1" />
      <div class="meta">
        <div class="tag">V1 · 추천</div>
        <h2>크림 배경 + G&amp;W</h2>
        <p>밝은 배경이 어두운 피드에서 가장 잘 튀고 또렷함. 무난·프리미엄.</p>
        <div class="ig"><img src="./mark-v1.png" alt="" /><span class="lbl">← 인스타 아바타 크기</span></div>
        
      </div>
    </div>
    <div class="card">
      <img class="big" src="./mark-v3.png" alt="V3" />
      <div class="meta">
        <div class="tag">V3</div>
        <h2>골드 배경 + G&amp;W</h2>
        <p>가장 눈에 띄고 따뜻함. 피드에서 존재감 최고.</p>
        <div class="ig"><img src="./mark-v3.png" alt="" /><span class="lbl">← 인스타 아바타 크기</span></div>
      </div>
    </div>
    <div class="card sel">
      <img class="big" src="./mark-v2.png" alt="V2" />
      <div class="meta">
        <div class="tag">V2</div>
        <h2>잉크 배경 + 골드 &amp;</h2>
        <p>가장 우아·미니멀. 골드 앰퍼샌드가 브랜드 시그니처.</p>
        <div class="winner">✓ 지금 이걸로 설정돼 있어요</div>
        <div class="ig"><img src="./mark-v2.png" alt="" /><span class="lbl">← 인스타 아바타 크기</span></div>
      </div>
    </div>
  </div>
</body>
</html>
