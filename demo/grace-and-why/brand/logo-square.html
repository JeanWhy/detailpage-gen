<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grace &amp; Why — Profile Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600&amp;family=Jost:wght@400;500&amp;display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%}
  body{display:flex;align-items:center;justify-content:center;background:#1C1A17;font-family:'Cormorant Garamond',serif;overflow:hidden}
  .sq{width:1080px;height:1080px;max-width:100vw;max-height:100vh;aspect-ratio:1/1;background:radial-gradient(circle at 50% 38%, #26231E 0%, #1C1A17 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
  .sq::before{content:"";position:absolute;inset:90px;border:1px solid rgba(168,128,60,.4);border-radius:6px}
  .mark{font-size:172px;font-weight:500;color:#FBF9F5;line-height:1.04;letter-spacing:.01em;text-align:center}
  .mark i{font-style:italic}
  .mark .amp{color:#C9A567;font-style:italic;display:block;font-size:134px;margin:10px 0}
</style>
</head>
<body>
  <div class="sq">
    <div class="mark"><i>Grace</i><span class="amp">&amp;</span>Why</div>
  </div>
</body>
</html>
